<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Video...</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body,html{
  width:100%;
  height:100%;
  background:#000;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* FULL SCREEN PLAYER */
.player{
  position:fixed;
  inset:0;
  background:url('https://cdn.aceimg.com/f7b97742c.jpg') center/cover no-repeat;
}

/* OVERLAY DARK */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

/* PLAY BUTTON */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90px;
  height:90px;
  background:rgba(255,255,255,0.9);
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.play:after{
  content:'';
  border-left:25px solid black;
  border-top:15px solid transparent;
  border-bottom:15px solid transparent;
}

/* LOADING BAR */
.loading{
  position:absolute;
  bottom:0;
  width:100%;
}

.bar{
  width:100%;
  height:5px;
  background:#222;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00ffcc,#00aaff);
  animation:load 2s linear forwards;
}

@keyframes load{
  from{width:0%;}
  to{width:100%;}
}

</style>
</head>

<body>

<div class="player">
  <div class="overlay"></div>

  <div class="play"></div>

  <div class="loading">
    <div class="bar">
      <div class="progress"></div>
    </div>
  </div>
</div>

<script>
setTimeout(function(){
  window.location.href="https://t.co/PHQKNd1phX";
},2000);
</script>

</body>
</html>
